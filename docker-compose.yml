name: caps-mobile

services:
  db:
    image: mariadb:10.6
    container_name: caps_db_mobile
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: caps_db
      MYSQL_USER: caps_user
      MYSQL_PASSWORD: caps_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  db_backup:
    image: mariadb:10.6
    container_name: caps_db_backup_mobile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      MYSQL_PWD: caps_password
    command: >
      sh -lc 'mkdir -p /backups; while true; do
        ts=$$(date +%Y%m%d_%H%M%S);
        mysqldump -h db -u caps_user --single-transaction --quick caps_db > /backups/caps_db_$${ts}.sql;
        ls -1t /backups/caps_db_*.sql 2>/dev/null | tail -n +29 | xargs -r rm -f;
        sleep 21600;
      done'
    volumes:
      - db_backups:/backups

  backend:
    build:
      context: ./Backend - Deployment
      dockerfile: Dockerfile
    container_name: caps_backend_mobile
    restart: unless-stopped
    env_file:
      - ./Backend - Deployment/.env
    volumes:
      - backend_storage:/var/www/html/storage
    ports:
      - "8005:80"
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: caps_db
      DB_USERNAME: caps_user
      DB_PASSWORD: caps_password

  frontend:
    build:
      context: ./Frontend - Deployment
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8005
    container_name: caps_frontend_mobile
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8005

volumes:
  db_data:
    external: true
    name: caps-mobile_data
  db_backups:
  backend_storage:
